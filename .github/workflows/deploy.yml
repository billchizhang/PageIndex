name: Build and Deploy PageIndex API

on:
  push:
    branches:
      - main

env:
  AZURE_RESOURCE_GROUP: "asireon-claw"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          python -m pytest tests/test_api.py

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Bicep
        run: az bicep install

      - name: Ensure Shared ACR Exists
        id: ensure-acr
        run: |
          # Derive shared ACR name: strip hyphens from resource group name, append "acr"
          ACR_NAME=$(echo "${{ env.AZURE_RESOURCE_GROUP }}" | tr -d '-')acr
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV

          # Check if the ACR already exists
          if az acr show --name "$ACR_NAME" --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" &>/dev/null; then
            echo "Shared ACR '$ACR_NAME' already exists."
          else
            echo "Shared ACR '$ACR_NAME' not found. Creating..."
            az acr create \
              --name "$ACR_NAME" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --sku Basic \
              --admin-enabled true
          fi

          # Retrieve login server and admin credentials
          ACR_SERVER=$(az acr show --name "$ACR_NAME" --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "loginServer" -o tsv)
          ACR_PASSWORD=$(az acr credential show --name "$ACR_NAME" --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "passwords[0].value" -o tsv)
          echo "ACR_SERVER=$ACR_SERVER" >> $GITHUB_ENV
          echo "::add-mask::$ACR_PASSWORD"
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - name: Log in to ACR
        run: |
          TOKEN=$(az acr login --name ${{ env.ACR_NAME }} --expose-token --output tsv --query accessToken)
          docker login ${{ env.ACR_SERVER }} -u 00000000-0000-0000-0000-000000000000 -p "$TOKEN"

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ env.ACR_SERVER }}/pageindex-api:$IMAGE_TAG .
          docker push ${{ env.ACR_SERVER }}/pageindex-api:$IMAGE_TAG

      - name: Deploy App with New Image
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          deploymentName: pageindex-${{ github.sha }}
          parameters: >
            apiToken="${{ secrets.API_TOKEN }}"
            openaiApiKey="${{ secrets.OPENAI_API_KEY }}"
            containerImage="${{ env.ACR_SERVER }}/pageindex-api:${{ github.sha }}"
            acrLoginServer="${{ env.ACR_SERVER }}"
            acrPassword="${{ env.ACR_PASSWORD }}"

      # The Bicep containerApp API version may not expose requestTimeoutSeconds,
      # so we patch it directly via az resource update after every deployment.
      - name: Set ingress timeout (600s for large PDF processing)
        run: |
          az resource update \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ca-pageindex-api \
            --resource-type "Microsoft.App/containerApps" \
            --set properties.configuration.ingress.requestTimeoutSeconds=600
